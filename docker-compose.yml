services:
  db:
    image: postgres:17-alpine
    container_name: vms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: graduationDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aykut123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d graduationDB"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./VMS
      dockerfile: Dockerfile
    container_name: vms-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: graduationDB
      DB_USERNAME: postgres
      DB_PASSWORD: Aykut123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./VMS-Frontend.PleaseWork/Ye/VMS-Frontend.Vue/VMS-Frontend
      dockerfile: Dockerfile
    container_name: vms-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
