<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"></stop>
      <stop offset="55%" stop-color="#0E1B3A"></stop>
      <stop offset="100%" stop-color="#0A2A3A"></stop>
    </linearGradient>

    <radialGradient id="glow" cx="65%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#36D1DC" stop-opacity="0.22"></stop>
      <stop offset="55%" stop-color="#5B86E5" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>

    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#9FB3FF" stroke-opacity="0.08" stroke-width="1"></path>
    </pattern>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#g1)"></rect>
  <rect width="1920" height="1080" fill="url(#glow)"></rect>
  <rect width="1920" height="1080" fill="url(#grid)"></rect>

  <!-- Soft blobs -->
  <circle cx="340" cy="220" r="220" fill="#7C3AED" opacity="0.10" filter="url(#soft)"></circle>
  <circle cx="1540" cy="860" r="260" fill="#22C55E" opacity="0.08" filter="url(#soft)"></circle>
  <circle cx="1380" cy="260" r="190" fill="#38BDF8" opacity="0.10" filter="url(#soft)"></circle>

  <!-- Network lines -->
  <g stroke="#C7D2FE" stroke-opacity="0.18" stroke-width="2" fill="none">
    <path d="M320 760 C 520 620, 700 620, 880 520"></path>
    <path d="M880 520 C 1080 410, 1260 420, 1490 340"></path>
    <path d="M880 520 C 1120 650, 1280 740, 1560 780"></path>
    <path d="M560 360 C 760 420, 820 470, 880 520"></path>
    <path d="M520 920 C 660 780, 780 700, 880 520"></path>
  </g>

  <!-- Nodes -->
  <g filter="url(#shadow)">
    <!-- Vendor -->
    <circle cx="320" cy="760" r="18" fill="#22C55E"></circle>
    <circle cx="320" cy="760" r="42" fill="#22C55E" opacity="0.12"></circle>

    <!-- Task -->
    <circle cx="560" cy="360" r="18" fill="#38BDF8"></circle>
    <circle cx="560" cy="360" r="42" fill="#38BDF8" opacity="0.12"></circle>

    <!-- Approval -->
    <circle cx="880" cy="520" r="18" fill="#A78BFA"></circle>
    <circle cx="880" cy="520" r="42" fill="#A78BFA" opacity="0.12"></circle>

    <!-- Client -->
    <circle cx="1490" cy="340" r="18" fill="#F59E0B"></circle>
    <circle cx="1490" cy="340" r="42" fill="#F59E0B" opacity="0.12"></circle>

    <!-- Dashboard -->
    <circle cx="1560" cy="780" r="18" fill="#EF4444"></circle>
    <circle cx="1560" cy="780" r="42" fill="#EF4444" opacity="0.12"></circle>
  </g>

  <!-- Minimal “workflow cards” silhouettes -->
  <g opacity="0.18">
    <rect x="1020" y="120" rx="18" ry="18" width="520" height="130" fill="#FFFFFF"></rect>
    <rect x="1046" y="150" rx="10" ry="10" width="240" height="18" fill="#0B1020"></rect>
    <rect x="1046" y="182" rx="10" ry="10" width="420" height="14" fill="#0B1020"></rect>

    <rect x="180" y="120" rx="18" ry="18" width="520" height="130" fill="#FFFFFF"></rect>
    <rect x="206" y="150" rx="10" ry="10" width="280" height="18" fill="#0B1020"></rect>
    <rect x="206" y="182" rx="10" ry="10" width="420" height="14" fill="#0B1020"></rect>
  </g>

  <!-- Subtle title mark -->
  <g opacity="0.22" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" fill="#E0E7FF">
    <text x="120" y="1010" font-size="44" font-weight="700">Vendor Management System</text>
    <text x="120" y="1046" font-size="18" font-weight="500" opacity="0.9">Vendors • Tasks • Approvals • Dashboards</text>
  </g>
</svg>